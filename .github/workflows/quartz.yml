name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault content
        uses: actions/checkout@v4
        with:
          path: vault

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz v4
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git quartz
          cd quartz && npm ci

      - name: Copy vault content into Quartz
        run: |
          rm -rf quartz/content/*
          cp -r vault/Courses vault/Instructors vault/Paths vault/Skills vault/Topics quartz/content/
          cp vault/"000 Map of Content.md" quartz/content/index.md
          cp vault/CLAUDE.md quartz/content/ 2>/dev/null || true

      - name: Strip transcripts to reduce memory usage
        run: |
          # Remove transcript callout blocks from course files (bulk of content)
          # Replaces everything from "> [!transcript]" to end of file with a note
          find quartz/content/Courses -name '*.md' -exec python3 -c "
          import sys, re
          for f in sys.argv[1:]:
              with open(f, 'r') as fh: text = fh.read()
              text = re.sub(r'> \[!transcript\].*', '> *Transcript available in [Obsidian vault](https://github.com/thisis-romar/linkedin-learning-vault)*', text, count=1, flags=re.DOTALL)
              with open(f, 'w') as fh: fh.write(text)
          " {} +

      - name: Configure Quartz
        run: |
          cat > quartz/quartz.config.ts << 'CONF'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"

          const config: QuartzConfig = {
            configuration: {
              pageTitle: "LinkedIn Learning Vault",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              locale: "en-US",
              baseUrl: "thisis-romar.github.io/linkedin-learning-vault",
              ignorePatterns: ["private", "templates", ".obsidian"],
              defaultDateType: "created",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: {
                  header: "Schibsted Grotesk",
                  body: "Source Sans Pro",
                  code: "IBM Plex Mono",
                },
                colors: {
                  lightMode: {
                    light: "#faf8f8",
                    lightgray: "#e5e5e5",
                    gray: "#b8b8b8",
                    darkgray: "#4e4e4e",
                    dark: "#2b2b2b",
                    secondary: "#0a66c2",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#fff23688",
                  },
                  darkMode: {
                    light: "#161618",
                    lightgray: "#393639",
                    gray: "#646464",
                    darkgray: "#d4d4d4",
                    dark: "#ebebec",
                    secondary: "#4da3ff",
                    tertiary: "#84a59d",
                    highlight: "rgba(143, 159, 169, 0.15)",
                    textHighlight: "#fff23688",
                  },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({ priority: ["frontmatter"] }),
                Plugin.SyntaxHighlighting(),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlEmbed: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(),
                Plugin.ComponentResources(),
                Plugin.ContentPage(),
                Plugin.FolderPage(),
                Plugin.TagPage(),
                Plugin.ContentIndex({ enableSiteMap: true, enableRSS: true }),
                Plugin.Assets(),
                Plugin.Static(),
                Plugin.NotFoundPage(),
              ],
            },
          }

          export default config
          CONF

      - name: Build Quartz
        run: cd quartz && npx quartz build
        env:
          NODE_OPTIONS: "--max-old-space-size=7168"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
